<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Frete Logístico</title>
    <link rel="stylesheet" href="exercicio-03.css">
</head>
<body>
    <div class="container">
        <h2>Cálculo de Frete</h2>
        <form id="shipping-form">
            <div class="input-group">
                <label for="weight">Peso do produto (kg):</label>
                <input type="number" id="weight" step="0.01" required>
            </div>
            
            <div class="input-group">
                <label for="distance">Distância de entrega (km):</label>
                <input type="number" id="distance" step="0.1" required>
            </div>
            
            <button type="submit">Calcular Frete</button>
        </form>

        <div id="result-container" class="hidden">
            <p>Valor do Frete: <strong id="shipping-cost"></strong></p>
        </div>
        <div id="error-container" class="hidden error">
            <p id="error-message"></p>
        </div>
    </div>

    <script src="src/shipping.js"></script>
    <script src="exercicio-03.js"></script>
</body>
</html>
